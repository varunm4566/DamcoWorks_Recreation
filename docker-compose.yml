services:
  postgres:
    image: postgres:16-alpine
    container_name: damcoworks_db
    environment:
      POSTGRES_DB: damcoworks
      POSTGRES_USER: damco
      POSTGRES_PASSWORD: damco123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
